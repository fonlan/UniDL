<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniDL 扩展设置</title>
  <link rel="stylesheet" href="settings.css" />
</head>

<body>
  <main>
    <header>
      <h1>UniDL 扩展设置</h1>
    </header>

    <section>
      <label>
        <span>API 地址</span>
        <input id="api-base-url" type="url" />
      </label>
      <button id="connect" type="button">保存并重新连接</button>
    </section>

    <section class="checks">
      <label>
        <input id="cancel-original" type="checkbox" />
        <span>发送成功后取消原始下载</span>
      </label>
    </section>

    <p id="status" role="status"></p>
  </main>
  <script src="settings.js"></script>
</body>

</html>
