<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UniDL 扩展设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>

  <body>
    <main>
      <header>
        <h1>UniDL 扩展设置</h1>
      </header>

      <section>
        <label>
          <span>API 地址</span>
          <input id="api-base-url" type="url" />
        </label>
        <button id="connect" type="button">保存并重新连接</button>
      </section>

      <section>
        <label>
          <span>最小捕获大小（MB）</span>
          <input id="min-capture-size-mb" type="number" min="0" step="0.1" />
        </label>
        <p class="hint">小于该大小的浏览器下载不会发送到 UniDL；大小未知时仍会捕获。</p>
      </section>

      <section class="checks">
        <label>
          <input id="cancel-original" type="checkbox" />
          <span>发送成功后取消原始下载</span>
        </label>
      </section>

      <p id="status" role="status"></p>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
