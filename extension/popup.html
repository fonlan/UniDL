<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UniDL</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>UniDL</h1>
          <p id="last-event">未连接</p>
        </div>
      </header>

      <section>
        <label>
          <span>API 地址</span>
          <input id="api-base-url" type="url" />
        </label>
        <label>
          <span>访问密码</span>
          <input id="password" type="password" />
        </label>
        <div class="row">
          <button id="connect" type="button">保存并连接</button>
          <button id="clear-token" type="button">清除令牌</button>
        </div>
      </section>

      <section>
        <label>
          <span>默认引擎</span>
          <select id="default-engine">
            <option value="aria2">aria2</option>
            <option value="yt-dlp">yt-dlp</option>
            <option value="qbittorrent">qBittorrent</option>
          </select>
        </label>
        <label>
          <span>保存路径</span>
          <input id="save-path" type="text" />
        </label>
        <label>
          <span>任务参数</span>
          <textarea id="engine-args" rows="2"></textarea>
        </label>
      </section>

      <section class="checks">
        <label>
          <input id="intercept-enabled" type="checkbox" />
          <span>拦截浏览器下载</span>
        </label>
        <label>
          <input id="cancel-original" type="checkbox" />
          <span>发送成功后取消原始下载</span>
        </label>
      </section>

      <section>
        <label>
          <span>手动添加来源</span>
          <textarea id="manual-source" rows="3"></textarea>
        </label>
        <div class="row">
          <button id="save-settings" type="button">保存设置</button>
          <button id="send-source" type="button">发送来源</button>
        </div>
      </section>

      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
