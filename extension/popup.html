<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UniDL</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>UniDL</h1>
          <p id="last-event">正在连接</p>
        </div>
      </header>

      <section>
        <label>
          <span>API 地址</span>
          <input id="api-base-url" type="url" />
        </label>
        <button id="connect" type="button">重新连接</button>
      </section>

      <section>
        <h2>当前页面视频</h2>
        <div class="video-actions">
          <button id="detect-videos" type="button">检测当前页面</button>
        </div>
        <div id="videos" class="videos"></div>
      </section>

      <section class="checks">
        <label>
          <input id="intercept-enabled" type="checkbox" />
          <span>拦截浏览器下载</span>
        </label>
        <label>
          <input id="cancel-original" type="checkbox" />
          <span>发送成功后取消原始下载</span>
        </label>
      </section>

      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
